<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Research</title>
  <meta name="description"
    content="AI-powered YouTube research assistant. Ask anything and get answers synthesized from real YouTube videos." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red: #FF0000;
      --red-dim: #CC0000;
      --red-glow: rgba(255, 0, 0, 0.18);
      --bg: #0A0A0A;
      --surface: #111111;
      --surface2: #1A1A1A;
      --surface3: #222222;
      --border: #2A2A2A;
      --text: #F1F1F1;
      --muted: #717171;
      --radius: 12px;
      --user-bg: linear-gradient(135deg, #CC0000, #FF0000);
      --bot-bg: #151515;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Scanline overlay ─────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.03) 2px,
          rgba(0, 0, 0, 0.03) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Header ───────────────────────────────────── */
    header {
      position: relative;
      z-index: 100;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--red);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 14px var(--red-glow);
    }

    .logo-icon svg {
      width: 16px;
      height: 16px;
      fill: #fff;
    }

    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.35rem;
      letter-spacing: 0.06em;
      color: var(--text);
    }

    .logo-text span {
      color: var(--red);
    }

    .header-badge {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── Chat Container ──────────────────────────── */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      scroll-behavior: auto;
    }

    #chat-container::-webkit-scrollbar {
      width: 6px;
    }

    #chat-container::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ── Welcome Screen ──────────────────────────── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .welcome-glow {
      width: 80px;
      height: 80px;
      background: var(--red);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 60px rgba(255, 0, 0, 0.25), 0 0 120px rgba(255, 0, 0, 0.1);
      margin-bottom: 2rem;
    }

    .welcome-glow svg {
      width: 36px;
      height: 36px;
      fill: #fff;
    }

    .welcome-eyebrow {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 0.8rem;
    }

    .welcome h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      line-height: 0.95;
      letter-spacing: 0.03em;
      margin-bottom: 0.8rem;
    }

    .welcome h2 em {
      font-style: normal;
      color: var(--red);
    }

    .welcome-sub {
      font-size: 0.9rem;
      color: var(--muted);
      max-width: 420px;
      line-height: 1.6;
      font-weight: 300;
    }

    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 2rem;
    }

    .welcome-chip {
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .welcome-chip:hover {
      color: var(--text);
      border-color: var(--red);
      background: rgba(255, 0, 0, 0.08);
    }

    /* ── Chat Bubbles ────────────────────────────── */
    .msg-row {
      display: flex;
      gap: 10px;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      animation: msgIn 0.3s ease;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-row.user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.75rem;
      font-weight: 700;
      margin-top: 2px;
    }

    .msg-row.user .msg-avatar {
      background: var(--red);
      color: #fff;
    }

    .msg-row.bot .msg-avatar {
      background: var(--surface3);
      color: var(--red);
      border: 1px solid var(--border);
    }

    .msg-content {
      flex: 1;
      min-width: 0;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.92rem;
      line-height: 1.7;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .msg-row.user .msg-bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-row.bot .msg-bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* ── Status indicator ────────────────────────── */
    .msg-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      margin-bottom: 4px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 6px var(--red);
      }

      50% {
        opacity: 0.3;
        box-shadow: none;
      }
    }

    /* ── Typing cursor ───────────────────────────── */
    .typing-cursor::after {
      content: '▊';
      color: var(--red);
      animation: blink 0.8s step-end infinite;
      margin-left: 1px;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    /* ── Sources ──────────────────────────────────── */
    .sources-wrapper {
      margin-top: 10px;
    }

    .sources-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      padding: 6px 0;
      transition: color 0.2s;
      background: none;
      border: none;
    }

    .sources-toggle:hover {
      color: var(--red);
    }

    .sources-toggle .arrow {
      transition: transform 0.2s;
      font-size: 0.6rem;
    }

    .sources-toggle.open .arrow {
      transform: rotate(90deg);
    }

    .sources-list {
      display: flex;
      flex-direction: row;
      gap: 8px;
      margin-top: 8px;
      overflow-x: auto;
      padding-bottom: 6px;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
    }

    .sources-list.hidden {
      display: none;
    }

    .sources-list::-webkit-scrollbar {
      height: 5px;
    }
    .sources-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .sources-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .source-item {
      flex-shrink: 0;
      width: 240px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.12s;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
    }

    .source-item:hover {
      border-color: #444;
      transform: translateY(-2px);
    }

    .source-thumb-wrap {
      position: relative;
      display: block;
      width: 100%;
      height: 72px;
      overflow: hidden;
      background: #000;
      flex-shrink: 0;
    }

    .source-thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .source-play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.35);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .source-thumb-wrap:hover .source-play-overlay {
      opacity: 1;
    }

    .source-play-btn {
      width: 32px;
      height: 32px;
      background: var(--red);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(255, 0, 0, 0.4);
    }

    .source-play-btn svg {
      width: 14px;
      height: 14px;
      fill: #fff;
      margin-left: 2px;
    }

    .source-ts-badge {
      position: absolute;
      bottom: 4px;
      right: 4px;
      font-size: 0.6rem;
      font-weight: 700;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 2px 5px;
      border-radius: 3px;
      letter-spacing: 0.02em;
    }

    .source-info {
      padding: 6px 8px 8px;
      flex: 1;
      min-width: 0;
    }

    .source-title {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .source-text {
      font-size: 0.68rem;
      color: var(--muted);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Markdown table & hr ───────────────────────── */
    .msg-bubble .md-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85em;
      margin: 10px 0;
    }
    .msg-bubble .md-table th,
    .msg-bubble .md-table td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .msg-bubble .md-table th {
      background: var(--surface2);
      font-weight: 600;
      color: var(--text);
    }
    .msg-bubble .md-table td {
      color: var(--text);
    }
    .msg-bubble .md-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }
    .msg-bubble .md-hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }
    .msg-bubble .md-pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin: 10px 0;
      overflow-x: auto;
      font-size: 0.82em;
      line-height: 1.5;
    }
    .msg-bubble .md-pre code {
      background: none;
      padding: 0;
      color: var(--text);
      font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace;
    }
    .msg-bubble .md-blockquote {
      border-left: 4px solid var(--red);
      background: rgba(255, 0, 0, 0.06);
      padding: 10px 14px;
      margin: 8px 0;
      border-radius: 0 8px 8px 0;
      color: var(--text);
    }

    /* ── Input Bar ────────────────────────────────── */
    .input-bar {
      flex-shrink: 0;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      padding: 12px 1rem;
    }

    .input-area {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-field {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      line-height: 1.5;
      padding: 12px 16px;
      resize: none;
      outline: none;
      min-height: 46px;
      max-height: 140px;
      overflow-y: auto;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-field::placeholder {
      color: var(--muted);
    }

    .input-field:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.08);
    }

    .send-btn {
      width: 46px;
      height: 46px;
      background: var(--red);
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: var(--red-dim);
      box-shadow: 0 4px 20px rgba(255, 0, 0, 0.3);
    }

    .send-btn:active {
      transform: scale(0.94);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    /* ── Toast ────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    #toast.error {
      border-color: var(--red);
    }

    #toast .toast-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    #toast.error .toast-dot {
      background: var(--red);
    }

    /* ── Mobile ───────────────────────────────────── */
    @media (max-width: 600px) {
      .header-badge {
        display: none;
      }

      .welcome h2 {
        font-size: 2rem;
      }

      .welcome-chips {
        gap: 6px;
      }

      .welcome-chip {
        font-size: 0.72rem;
        padding: 6px 12px;
      }

      .msg-row {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <a class="logo" href="/">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z" />
        </svg>
      </div>
      <span class="logo-text">YT<span>Research</span></span>
    </a>
    <div class="header-badge">Powered by LangChain + Qdrant</div>
  </header>

  <!-- Chat Area -->
  <div id="chat-container">
    <div class="welcome" id="welcome-screen">
      <div class="welcome-glow">
        <svg viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z" />
        </svg>
      </div>
      <div class="welcome-eyebrow">AI-Powered Video Intelligence</div>
      <h2>Search Inside <em>Any Video</em></h2>
      <p class="welcome-sub">Ask anything. Your assistant searches YouTube automatically and synthesizes answers from
        real videos.</p>
      <div class="welcome-chips">
        <div class="welcome-chip" onclick="useChip(this)">How to cook biryani</div>
        <div class="welcome-chip" onclick="useChip(this)">Tutorial on Hair DIY</div>
        <div class="welcome-chip" onclick="useChip(this)">Iran vs Israel War Updates</div>
        <div class="welcome-chip" onclick="useChip(this)">LangChain vs LlamaIndex</div>
      </div>
    </div>
  </div>

  <!-- Input Bar -->
  <div class="input-bar">
    <div class="input-area">
      <textarea class="input-field" id="chat-input" placeholder="Ask about any topic…" rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Toast
  <div id="toast">
    <div class="toast-dot"></div>
    <span id="toast-msg">Done</span>
  </div> -->

  <script>
    // ── Config ─────────────────────────────────────────
    const API_BASE = "";  // same origin
    let isStreaming = false;

    // ── Toast ───────────────────────────────────────────
    let toastTimer;
    function showToast(msg, isError = false) {
      const el = document.getElementById('toast');
      document.getElementById('toast-msg').textContent = msg;
      el.classList.toggle('error', isError);
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
    }

    // ── Auto-resize textarea ──────────────────────────
    const chatInput = document.getElementById('chat-input');
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 140) + 'px';
    });

    // ── Keyboard shortcuts ────────────────────────────
    chatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ── Suggestion chips ──────────────────────────────
    function useChip(el) {
      chatInput.value = el.textContent;
      chatInput.focus();
      sendMessage();
    }

    // ── Scroll helper ─────────────────────────────────
    const chatContainer = document.getElementById('chat-container');
    function scrollToBottom() {
      requestAnimationFrame(() => {
        chatContainer.scrollTop = chatContainer.scrollHeight;
      });
    }

    // ── HTML escape ───────────────────────────────────
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Simple markdown → HTML ────────────────────────
    function parseTableRow(line) {
      const cells = line.split('|').map(c => c.trim());
      if (cells.length && cells[0] === '') cells.shift();
      if (cells.length && cells[cells.length - 1] === '') cells.pop();
      return cells;
    }
    function isTableSeparator(line) {
      return /^\|[\s\-:]+\|$/.test(line) || /^[\s\-:|]+$/.test(line.trim());
    }
    function renderMarkdown(text) {
      const escaped = esc(text);
      let lines = escaped.split('\n');
      const codePlaceholders = [];
      const quotePlaceholders = [];
      const tablePlaceholders = [];

      // 1) Fenced code blocks (```lang ... ```)
      let i = 0;
      while (i < lines.length) {
        const t = lines[i].trim();
        if (/^```\s*\w*\s*$/.test(t)) {
          const start = i;
          const lang = (t.replace(/^```/, '').trim() || '').slice(0, 20);
          i++;
          const codeLines = [];
          while (i < lines.length && !/^```\s*$/.test(lines[i].trim())) {
            codeLines.push(lines[i]);
            i++;
          }
          const codeContent = codeLines.join('\n');
          const langAttr = lang ? ` class="language-${lang}"` : '';
          const codeHtml = '<pre class="md-pre"><code' + langAttr + '>' + codeContent + '</code></pre>';
          codePlaceholders.push(codeHtml);
          const placeholder = '{{CODE_' + (codePlaceholders.length - 1) + '}}';
          const end = (i < lines.length && /^```\s*$/.test(lines[i].trim())) ? i + 1 : i;
          lines = lines.slice(0, start).concat([placeholder], lines.slice(end));
          i = start + 1;
        } else {
          i++;
        }
      }

      // 2) Blockquotes (consecutive lines starting with >)
      i = 0;
      while (i < lines.length) {
        const line = lines[i];
        if (typeof line === 'string' && line.match(/^\{\{CODE_\d+\}\}$/)) {
          i++;
          continue;
        }
        const trimmed = line.trim();
        if (trimmed.startsWith('>')) {
          const start = i;
          const quoteLines = [];
          while (i < lines.length) {
            const l = lines[i];
            if (typeof l === 'string' && l.match(/^\{\{CODE_\d+\}\}$/)) break;
            const lt = l.trim();
            if (!lt.startsWith('>')) break;
            quoteLines.push(lt.replace(/^>\s?/, ''));
            i++;
          }
          const quoteContent = quoteLines.join('<br>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/`([^`]+)`/g, '<code style="background:var(--surface3);padding:2px 6px;border-radius:4px;font-size:0.85em;">$1</code>');
          const quoteHtml = '<blockquote class="md-blockquote">' + quoteContent + '</blockquote>';
          quotePlaceholders.push(quoteHtml);
          const placeholder = '{{QUOTE_' + (quotePlaceholders.length - 1) + '}}';
          lines = lines.slice(0, start).concat([placeholder], lines.slice(i));
          i = start + 1;
        } else {
          i++;
        }
      }

      // 3) Tables
      i = 0;
      while (i < lines.length) {
        const line = lines[i];
        if (typeof line === 'string' && (line.match(/^\{\{CODE_\d+\}\}$/) || line.match(/^\{\{QUOTE_\d+\}\}$/))) {
          i++;
          continue;
        }
        if (/^\|.+\|$/.test(line.trim())) {
          const start = i;
          const block = [];
          while (i < lines.length) {
            const l = lines[i];
            if (typeof l === 'string' && (l.match(/^\{\{CODE_\d+\}\}$/) || l.match(/^\{\{QUOTE_\d+\}\}$/))) break;
            if (!/^\|.+\|$/.test(l.trim())) break;
            block.push(l);
            i++;
          }
          const headerCells = parseTableRow(block[0]);
          const sepIdx = block.findIndex(l => isTableSeparator(l.trim()));
          const bodyRows = sepIdx >= 0 ? block.slice(sepIdx + 1) : block.slice(1);
          let tableHtml = '<table class="md-table"><thead><tr>';
          headerCells.forEach(c => { tableHtml += '<th>' + c + '</th>'; });
          tableHtml += '</tr></thead><tbody>';
          bodyRows.forEach(row => {
            const cells = parseTableRow(row);
            tableHtml += '<tr>';
            cells.forEach(c => { tableHtml += '<td>' + c + '</td>'; });
            tableHtml += '</tr>';
          });
          tableHtml += '</tbody></table>';
          tablePlaceholders.push(tableHtml);
          const placeholder = '{{TABLE_' + (tablePlaceholders.length - 1) + '}}';
          lines = lines.slice(0, start).concat([placeholder], lines.slice(i));
          i = start + 1;
        } else {
          i++;
        }
      }

      const processed = lines.map(line => {
        if (typeof line === 'string' && line.match(/^\{\{(TABLE|CODE|QUOTE)_\d+\}\}$/))
          return line;
        // Horizontal rule: --- or *** or ___
        if (/^[\s]*[-*_]{3,}[\s]*$/.test(line))
          return '<hr class="md-hr">';
        // Headings: #### → h6, ### → h5, ## → h4, # → h3
        if (line.startsWith('#### ')) return `<h6 style="font-size:0.85em;margin:8px 0 4px;color:var(--text);">${line.slice(5)}</h6>`;
        if (line.startsWith('### '))  return `<h5 style="font-size:0.92em;margin:10px 0 4px;color:var(--text);">${line.slice(4)}</h5>`;
        if (line.startsWith('## '))   return `<h4 style="font-size:1.0em;margin:12px 0 4px;color:var(--text);">${line.slice(3)}</h4>`;
        if (line.startsWith('# '))    return `<h3 style="font-size:1.1em;margin:14px 0 6px;color:var(--text);">${line.slice(2)}</h3>`;
        return line;
      });

      let out = processed.join('<br>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code style="background:var(--surface3);padding:2px 6px;border-radius:4px;font-size:0.85em;">$1</code>');

      codePlaceholders.forEach((html, idx) => { out = out.replace('{{CODE_' + idx + '}}', html); });
      quotePlaceholders.forEach((html, idx) => { out = out.replace('{{QUOTE_' + idx + '}}', html); });
      tablePlaceholders.forEach((html, idx) => { out = out.replace('{{TABLE_' + idx + '}}', html); });
      return out;
    }

    // ── Add messages ──────────────────────────────────
    function addUserMessage(text) {
      // Hide welcome
      const welcome = document.getElementById('welcome-screen');
      if (welcome) welcome.remove();

      const row = document.createElement('div');
      row.className = 'msg-row user';
      row.innerHTML = `
      <div class="msg-avatar">You</div>
      <div class="msg-content">
        <div class="msg-bubble">${esc(text)}</div>
      </div>
    `;
      chatContainer.appendChild(row);
      scrollToBottom();
    }

    function addBotMessage() {
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.innerHTML = `
      <div class="msg-avatar">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="msg-content">
        <div class="msg-status" id="bot-status">
          <div class="status-dot"></div>
          <span>Thinking…</span>
        </div>
        <div class="msg-bubble typing-cursor" id="bot-bubble"></div>
        <div class="sources-wrapper" id="bot-sources" style="display:none"></div>
      </div>
    `;
      chatContainer.appendChild(row);
      scrollToBottom();
      return {
        statusEl: row.querySelector('#bot-status'),
        bubbleEl: row.querySelector('#bot-bubble'),
        sourcesEl: row.querySelector('#bot-sources'),
      };
    }

    // ── Render sources ────────────────────────────────
    function getVideoId(url) {
      try {
        const u = new URL(url);
        return u.searchParams.get('v') || '';
      } catch { return ''; }
    }

    function renderSources(sourcesEl, sources) {
      if (!sources || sources.length === 0) {
        sourcesEl.style.display = 'none';
        return;
      }

      const id = 'src-' + Date.now();
      const cardsHTML = sources.map(s => {
        const vid = getVideoId(s.video_url);
        const thumb = vid ? `https://img.youtube.com/vi/${vid}/mqdefault.jpg` : '';
        return `
        <div class="source-item">
          <a class="source-thumb-wrap" href="${esc(s.video_url)}" target="_blank" rel="noopener">
            ${thumb ? `<img src="${thumb}" alt="${esc(s.video_title)}" loading="lazy"/>` : ''}
            <div class="source-play-overlay">
              <div class="source-play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
            </div>
            ${s.timestamp ? `<span class="source-ts-badge">${esc(s.timestamp)}</span>` : ''}
          </a>
          <div class="source-info">
            <div class="source-title">${esc(s.video_title)}</div>
            <p class="source-text">${esc(s.text)}</p>
          </div>
        </div>`;
      }).join('');

      sourcesEl.innerHTML = `
      <button class="sources-toggle" onclick="toggleSources('${id}', this)">
        <span class="arrow">▶</span> Sources (${sources.length})
      </button>
      <div class="sources-list hidden" id="${id}">
        ${cardsHTML}
      </div>
    `;
      sourcesEl.style.display = 'block';
    }

    function toggleSources(id, btn) {
      const list = document.getElementById(id);
      list.classList.toggle('hidden');
      btn.classList.toggle('open');
    }

    // ── Send message (SSE streaming) ──────────────────
    async function sendMessage() {
      if (isStreaming) return;
      const text = chatInput.value.trim();
      if (!text) return;

      chatInput.value = '';
      chatInput.style.height = 'auto';
      chatInput.blur();
      isStreaming = true;
      document.getElementById('send-btn').disabled = true;

      addUserMessage(text);
      const { statusEl, bubbleEl, sourcesEl } = addBotMessage();

      // Clear IDs so next message gets fresh ones
      statusEl.removeAttribute('id');
      bubbleEl.removeAttribute('id');
      sourcesEl.removeAttribute('id');

      try {
        const res = await fetch(`${API_BASE}/api/research/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: text, top_k: 5 }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `Server error ${res.status}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let hasTokens = false;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          let eventType = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) {
              eventType = line.slice(7).trim();
            } else if (line.startsWith('data: ')) {
              const data = line.slice(6);
              handleSSE(eventType, data, statusEl, bubbleEl, sourcesEl, { hasTokens });
              if (eventType === 'token') hasTokens = true;
              eventType = '';
            }
          }
        }

        // Done
        bubbleEl.classList.remove('typing-cursor');
        statusEl.style.display = 'none';

      } catch (e) {
        bubbleEl.classList.remove('typing-cursor');
        statusEl.style.display = 'none';
        if (!bubbleEl.textContent.trim()) {
          bubbleEl.textContent = '⚠ ' + (e.message || 'Something went wrong');
          bubbleEl.style.color = 'var(--red)';
        }
        showToast(e.message || 'Request failed', true);
      } finally {
        isStreaming = false;
        document.getElementById('send-btn').disabled = false;
        scrollToBottom();
      }
    }

    function handleSSE(event, data, statusEl, bubbleEl, sourcesEl, state) {
      switch (event) {
        case 'status':
          statusEl.querySelector('span').textContent = data;
          statusEl.style.display = 'flex';
          scrollToBottom();
          break;

        case 'token':
          if (!state.hasTokens) {
            // First token — hide status bar
            statusEl.style.display = 'none';
            bubbleEl._rawText = '';
          }
          try {
            const token = JSON.parse(data);
            bubbleEl._rawText = (bubbleEl._rawText || '') + token;
          } catch {
            bubbleEl._rawText = (bubbleEl._rawText || '') + data;
          }
          bubbleEl.innerHTML = renderMarkdown(bubbleEl._rawText);
          scrollToBottom();
          break;

        case 'sources':
          try {
            const sources = JSON.parse(data);
            renderSources(sourcesEl, sources);
          } catch { }
          scrollToBottom();
          break;

        case 'error':
          try {
            const errMsg = JSON.parse(data);
            showToast(errMsg, true);
          } catch {
            showToast(data, true);
          }
          break;

        case 'done':
          bubbleEl.classList.remove('typing-cursor');
          statusEl.style.display = 'none';
          break;
      }
    }
  </script>
</body>
